<header class="topbar">
    <div class="topbar-brand">
        <img src="/_ui/static/logo.svg" alt="{{ brand }}" class="topbar-logo">
        <span class="topbar-brand-name">{{ brand }}</span>
    </div>
    <div class="topbar-actions">
        {% include "ui/product_switcher.html" %}
        <div class="topbar-account">
            <span class="topbar-username">{{ current_user.username }}</span>
            {% block account_actions %}
            {#- 个人中心：platform 走本服务 /account，业务跨站到 {platform_url}/account -#}
            <a href="{% if current_service == 'platform' %}/account{% else %}{{ platform_url }}/account{% endif %}" class="btn btn-ghost btn-sm">个人中心</a>
            {% endblock %}
        </div>
    </div>
</header>
