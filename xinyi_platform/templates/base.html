<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>{% block title %}xinyi-platform{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <nav>
      {% if current_user %}
        <span>{{ current_user.username }}</span>
        <a href="/account">账户</a>
        <a href="/logout">登出</a>
      {% else %}
        <a href="/login">登录</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
