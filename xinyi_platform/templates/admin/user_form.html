{% extends "admin/base.html" %}
{% block title %}{% if user %}编辑用户{% else %}新建用户{% endif %}{% endblock %}
{% block main %}
<div class="content-header">
    <h2>{% if user %}编辑 {{ user.username }}{% else %}新建用户{% endif %}</h2>
</div>
<div class="card">
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="{% if user %}/xinyi/admin/users/{{ user.id }}{% else %}/xinyi/admin/users{% endif %}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label>用户名</label>
            <input name="username" value="{{ user.username if user else '' }}" required>
        </div>
        <div class="form-group">
            <label>显示名</label>
            <input name="display_name" value="{{ user.display_name if user else '' }}">
        </div>
        <div class="form-group">
            <label>邮箱</label>
            <input name="email" value="{{ user.email if user else '' }}">
        </div>
        <div class="form-group">
            <label>角色</label>
            <select name="role">
                <option value="user" {{ 'selected' if user and user.role.value == 'user' else '' }}>user</option>
                <option value="admin" {{ 'selected' if user and user.role.value == 'admin' else '' }}>admin</option>
            </select>
        </div>
        {% if not user %}
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" required>
        </div>
        {% endif %}
        <button type="submit" class="btn btn-primary">保存</button>
    </form>
</div>
{% endblock %}
