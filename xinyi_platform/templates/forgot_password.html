{% extends "ui/auth_shell.html" %}
{% block title %}找回密码{% endblock %}
{% block auth_body %}
<form method="post" action="/xinyi/password/forgot">
    <div class="form-group">
        <label>邮箱</label>
        <input type="email" name="email" required>
    </div>
    {% if info %}<p class="info">{{ info }}</p>{% endif %}
    <button type="submit" class="btn btn-primary btn-block">发送重置码</button>
</form>
{% endblock %}
