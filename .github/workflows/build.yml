name: Build Image

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build xinyi-platform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "SHORT=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/xinyi-platform:latest
            ghcr.io/${{ github.repository_owner }}/xinyi-platform:${{ steps.sha.outputs.SHORT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Delete old package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSIONS=$(gh api user/packages/container/xinyi-platform/versions --paginate -q '.[].id')
          TOTAL=$(echo "$VERSIONS" | wc -l | tr -d ' ')
          KEEP=10
          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "Only $TOTAL versions, nothing to clean up"
            exit 0
          fi
          echo "Keeping latest $KEEP of $TOTAL versions"
          echo "$VERSIONS" | tail -n +$((KEEP + 1)) | while read vid; do
            echo "Deleting version $vid"
            gh api -X DELETE user/packages/container/xinyi-platform/versions/$vid || true
          done
